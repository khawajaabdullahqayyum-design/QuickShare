name: Build QuickShare APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean all XML files (remove BOM, fix encoding)
        run: |
          python3 << 'EOF'
          import os
          import glob

          res_dir = "app/src/main/res"
          xml_files = glob.glob(os.path.join(res_dir, "**/*.xml"), recursive=True)
          
          for file_path in xml_files:
              # Read as bytes to detect BOM
              with open(file_path, "rb") as f:
                  raw = f.read()
              
              # Remove UTF-8 BOM (EF BB BF)
              if raw.startswith(b'\xef\xbb\xbf'):
                  raw = raw[3:]
              
              # Remove any other BOM occurrences (just in case)
              raw = raw.replace(b'\xef\xbb\xbf', b'')
              raw = raw.replace(b'\xff\xfe', b'')   # UTF-16 LE BOM
              raw = raw.replace(b'\xfe\xff', b'')   # UTF-16 BE BOM
              
              # Decode safely
              try:
                  text = raw.decode('utf-8')
              except UnicodeDecodeError:
                  text = raw.decode('utf-8', errors='ignore')
              
              # Remove any non-printable control characters except whitespace
              # that might appear before the first '<'
              first_lt = text.find('<')
              if first_lt > 0:
                  prefix = text[:first_lt]
                  # Keep only whitespace
                  prefix_clean = ''.join(c for c in prefix if c in ' \t\n\r')
                  text = prefix_clean + text[first_lt:]
              
              # Write back as clean UTF-8 without BOM
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(text)
          
          print(f"Cleaned {len(xml_files)} XML files.")
          EOF

      - name: Verify XML files are well-formed
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          import glob
          import os

          res_dir = "app/src/main/res"
          xml_files = glob.glob(os.path.join(res_dir, "**/*.xml"), recursive=True)
          
          failed = []
          for f in xml_files:
              try:
                  ET.parse(f)
              except Exception as e:
                  failed.append((f, str(e)))
          
          if failed:
              print("ERROR: The following XML files are not well-formed:")
              for f, err in failed:
                  print(f"  - {f}: {err}")
              exit(1)
          else:
              print(f"All {len(xml_files)} XML files are well-formed.")
          EOF

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickShare-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
